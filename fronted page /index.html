<!DOCTYPE html>
<html>

<head>

    <title>Language Translation Tool</title>

    <link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>AI Language Translation Tool</h1>

<form method="POST">

<textarea
name="text"
placeholder="Enter text here..."
required></textarea>

<select name="source">

{% for lang in languages %}

<option>{{lang}}</option>

{% endfor %}

</select>

<select name="target">

{% for lang in languages %}

<option>{{lang}}</option>

{% endfor %}

</select>

<button type="submit">

Translate

</button>

</form>

<h2>Translated Text</h2>

<textarea id="output" readonly>{{translated_text}}</textarea>

<br>

<button onclick="copyText()">Copy</button>

</div>

<script src="{{ url_for('static',filename='script.js') }}"></script>

</body>

</html>
